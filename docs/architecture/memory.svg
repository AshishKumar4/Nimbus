<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 580" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Inter, system-ui, sans-serif" role="img" aria-label="Supervisor heap budget: 7 components sum to estimatedBytes against a 64 MiB ceiling">
  <title>Supervisor heap budget — 64 MiB ceiling</title>
  <desc>Seven counters feed estimatedBytes. Static counters: supervisorBaselineBytes (9.0 MiB) and esbuildResidentBytes (0 MiB). VFS counters: vfsLruBytes capped at 32 MiB and vfsInFlightBytes. npm pipeline counters: resolverInFlightBytes and preBundleSliceBytes (both 0 — work runs in Worker Loader isolates). Supervisor RPC counter: streamingBuffersBytes. The seven sum to estimatedBytes, divided by 64 MiB to produce percentOfCeiling. Idle is 9.0 MiB. Peak under realistic load is 15.24 MiB at 23.8 percent.</desc>

  <defs>
    <style>
      .group-frame { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1; }
      .node        { fill: #ffffff; stroke: #0f172a; stroke-width: 1.4; }
      .ceiling     { fill: #fef3c7; stroke: #b45309; stroke-width: 1.6; }
      .gauge       { fill: #14532d; }
      .gauge-bg    { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1; }
      .title       { font-size: 12px; font-weight: 600; fill: #0f172a; }
      .label       { font-size: 12px; fill: #0f172a; }
      .meta        { font-size: 10px; fill: #64748b; }
      .group-title { font-size: 11px; font-weight: 600; fill: #475569; letter-spacing: 0.04em; text-transform: uppercase; }
      .num         { font-size: 11px; font-weight: 600; fill: #0f172a; font-variant-numeric: tabular-nums; }
      .num-zero    { font-size: 11px; fill: #94a3b8; font-variant-numeric: tabular-nums; }
      .edge        { fill: none; stroke: #475569; stroke-width: 1.3; }
      .edge-label  { font-size: 10px; fill: #475569; }
    </style>
    <marker id="arr-m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Three component groups, left -->
  <!-- Static -->
  <rect class="group-frame" x="40" y="40" width="320" height="120" rx="12"/>
  <text class="group-title" x="60" y="68">Static · constant per build</text>
  <rect class="node" x="60" y="80" width="280" height="32" rx="6"/>
  <text class="label" x="76" y="100">supervisorBaselineBytes</text>
  <text class="num"   x="324" y="100" text-anchor="end">9.0 MiB</text>
  <rect class="node" x="60" y="118" width="280" height="32" rx="6"/>
  <text class="label" x="76" y="138">esbuildResidentBytes</text>
  <text class="num-zero" x="324" y="138" text-anchor="end">0 · in env.ASSETS</text>

  <!-- VFS -->
  <rect class="group-frame" x="40" y="180" width="320" height="120" rx="12"/>
  <text class="group-title" x="60" y="208">VFS · live counters</text>
  <rect class="node" x="60" y="220" width="280" height="32" rx="6"/>
  <text class="label" x="76" y="240">vfsLruBytes</text>
  <text class="num"   x="324" y="240" text-anchor="end">≤ 32 MiB</text>
  <rect class="node" x="60" y="258" width="280" height="32" rx="6"/>
  <text class="label" x="76" y="278">vfsInFlightBytes</text>
  <text class="num"   x="324" y="278" text-anchor="end">peak write payload</text>

  <!-- npm pipeline -->
  <rect class="group-frame" x="40" y="320" width="320" height="120" rx="12"/>
  <text class="group-title" x="60" y="348">npm pipeline · peak counters</text>
  <rect class="node" x="60" y="360" width="280" height="32" rx="6"/>
  <text class="label" x="76" y="380">resolverInFlightBytes</text>
  <text class="num-zero" x="324" y="380" text-anchor="end">0 · in loader</text>
  <rect class="node" x="60" y="398" width="280" height="32" rx="6"/>
  <text class="label" x="76" y="418">preBundleSliceBytes</text>
  <text class="num-zero" x="324" y="418" text-anchor="end">0 · streamed RPC</text>

  <!-- Supervisor RPC -->
  <rect class="group-frame" x="40" y="460" width="320" height="80" rx="12"/>
  <text class="group-title" x="60" y="488">Supervisor RPC · live counter</text>
  <rect class="node" x="60" y="500" width="280" height="32" rx="6"/>
  <text class="label" x="76" y="520">streamingBuffersBytes</text>
  <text class="num"   x="324" y="520" text-anchor="end">in-flight RPC</text>

  <!-- Sum -->
  <rect class="node" x="480" y="240" width="240" height="60" rx="10"/>
  <text class="title" x="600" y="265" text-anchor="middle">Σ estimatedBytes</text>
  <text class="meta"  x="600" y="285" text-anchor="middle">sum of 7 components</text>

  <!-- Arrows from each group to Sum -->
  <path class="edge" d="M 360 100 C 410 100 430 240 480 260" marker-end="url(#arr-m)"/>
  <path class="edge" d="M 360 240 C 410 240 430 260 480 268" marker-end="url(#arr-m)"/>
  <path class="edge" d="M 360 380 C 410 380 430 290 480 280" marker-end="url(#arr-m)"/>
  <path class="edge" d="M 360 516 C 410 516 430 320 480 290" marker-end="url(#arr-m)"/>

  <!-- percent -->
  <rect class="node" x="480" y="340" width="240" height="48" rx="10"/>
  <text class="title" x="600" y="362" text-anchor="middle">percentOfCeiling</text>
  <text class="meta"  x="600" y="378" text-anchor="middle">estimatedBytes / 64 MiB</text>

  <path class="edge" d="M 600 300 V 340" marker-end="url(#arr-m)"/>

  <!-- Ceiling marker -->
  <rect class="ceiling" x="480" y="420" width="240" height="56" rx="10"/>
  <text class="title" x="600" y="444" text-anchor="middle">64 MiB ceiling</text>
  <text class="meta"  x="600" y="460" text-anchor="middle">SUPERVISOR_HEAP_CEILING_BYTES</text>

  <path class="edge" d="M 600 388 V 420" marker-end="url(#arr-m)"/>

  <!-- Right column: gauge -->
  <g transform="translate(800,40)">
    <text class="group-title" x="0" y="0">Measured against ceiling</text>

    <!-- Idle bar -->
    <text class="title" x="0" y="32">Idle baseline</text>
    <text class="num" x="400" y="32" text-anchor="end">9.00 MiB · 14.1%</text>
    <rect class="gauge-bg" x="0" y="40" width="400" height="22" rx="4"/>
    <rect class="gauge"    x="0" y="40" width="56"  height="22" rx="4"/>

    <!-- Peak bar -->
    <text class="title" x="0" y="98">Peak under load</text>
    <text class="num"  x="400" y="98" text-anchor="end">15.24 MiB · 23.8%</text>
    <rect class="gauge-bg" x="0" y="106" width="400" height="22" rx="4"/>
    <rect class="gauge"    x="0" y="106" width="95"  height="22" rx="4"/>
    <text class="meta" x="0" y="146">10-min realistic-load run · 297 preview fetches · 19 shell commands · 6 ws-kill cycles</text>

    <!-- Ceiling line -->
    <text class="title" x="0" y="186">Ceiling</text>
    <text class="num" x="400" y="186" text-anchor="end">64.00 MiB · 100%</text>
    <rect class="gauge-bg" x="0" y="194" width="400" height="22" rx="4"/>
    <rect fill="#fef3c7" stroke="#b45309" stroke-width="1.4" x="0" y="194" width="400" height="22" rx="4"/>
    <text class="meta" x="0" y="234">Headroom at peak: 48.76 MiB · 76.2%</text>

    <!-- Invariant card -->
    <rect class="node" x="0" y="270" width="400" height="100" rx="10"/>
    <text class="title" x="20" y="294">Invariant</text>
    <text class="label" x="20" y="316">sum(breakdown.*) === estimatedBytes</text>
    <text class="meta"  x="20" y="334">Validated at every estimator poll · enforced</text>
    <text class="meta"  x="20" y="350">in tests/regression/heap-estimator.test.ts</text>
  </g>
</svg>
